name: RackNerd Deal Monitor

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC. This checks every 30 minutes.
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: racknerd-deal-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install beautifulsoup4

      - name: Run RackNerd deal monitor
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python scripts/racknerd_deal_monitor.py

      - name: Commit monitor state if changed
        if: always()
        run: |
          if [[ -n "$(git status --porcelain _data/monitor)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add _data/monitor
            git commit -m "chore: update RackNerd monitor state"
            git pull --rebase
            git push
          else
            echo "No monitor state changes to commit."
          fi
