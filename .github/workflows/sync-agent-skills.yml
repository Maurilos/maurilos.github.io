name: Sync Agent Skills Hub

on:
  workflow_dispatch:
  schedule:
    # 每 8 小时一次；避开整点，减少排队概率
    - cron: "17 */8 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch and normalize data
        run: |
          mkdir -p _data/agentskills
          python <<'PY'
          import json, os, urllib.request

          BASE = "https://agentskillshub.top"

          endpoints = {
              "stats.json": f"{BASE}/api/stats",
              "trending.json": f"{BASE}/api/trending",
              "top-rated.json": f"{BASE}/api/top-rated",
              "landing.json": f"{BASE}/api/landing",
          }

          headers = {
              "User-Agent": "MauPhilos-AgentSkills-Sync/1.0"
          }

          for filename, url in endpoints.items():
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as resp:
                  raw = resp.read().decode("utf-8")
                  data = json.loads(raw)

              with open(os.path.join("_data/agentskills", filename), "w", encoding="utf-8") as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)

          # 额外保存一份更新时间
          meta = {
              "source": "https://agentskillshub.top",
              "updated_at_utc": __import__("datetime").datetime.utcnow().strftime("%Y-%m-%d %H:%M:%S UTC")
          }
          with open("_data/agentskills/meta.json", "w", encoding="utf-8") as f:
              json.dump(meta, f, ensure_ascii=False, indent=2)
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/agentskills
          git diff --cached --quiet || git commit -m "chore: sync AgentSkillsHub data"

      - name: Push changes
        run: |
          git push
