name: Sync Agent Skills Hub

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */8 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Fetch and build local content
        run: |
          mkdir -p _data/agentskills
          mkdir -p agent-skills/scenario

          python <<'PY'
          import json
          import os
          import re
          import time
          from datetime import datetime, timezone
          from urllib.parse import urljoin, urlparse

          import requests
          from bs4 import BeautifulSoup

          BASE = "https://agentskillshub.top"
          MAX_SCENARIOS = 12
          META_LABELS = [
              "MCP Server",
              "Agent Tool",
              "Claude Skill",
              "Codex Skill",
              "LLM Plugin",
          ]

          session = requests.Session()
          session.headers.update({
              "User-Agent": "MauPhilos-AgentSkills-Sync/2.1 (+https://ybot.top)"
          })

          def fetch_html(url: str, retries: int = 3) -> str:
              last_err = None
              for _ in range(retries):
                  try:
                      r = session.get(url, timeout=30)
                      r.raise_for_status()
                      return r.text
                  except Exception as e:
                      last_err = e
                      time.sleep(2)
              raise last_err

          def soup_of(url: str) -> BeautifulSoup:
              return BeautifulSoup(fetch_html(url), "html.parser")

          def text_lines(soup: BeautifulSoup):
              raw = soup.get_text("\n")
              lines = []
              for line in raw.splitlines():
                  line = re.sub(r"\s+", " ", line).strip()
                  if line:
                      lines.append(line)
              return lines

          def full_text(soup: BeautifulSoup) -> str:
              return " ".join(text_lines(soup))

          def safe_slug(text: str) -> str:
              slug = text.strip().lower()
              slug = re.sub(r"[^a-z0-9\-]+", "-", slug)
              slug = re.sub(r"-+", "-", slug).strip("-")
              return slug or "item"

          def escape_yaml(s: str) -> str:
              return s.replace('"', "'").strip()

          def parse_home_summary():
              soup = soup_of(BASE + "/")
              text = full_text(soup)

              tools_count = None
              projects_count = None
              scenarios_count = None
              refresh_hours = None

              m = re.search(r"Discover\s+([\d,]+)\+\s+AI Agent Tools", text, re.I)
              if m:
                  tools_count = m.group(1) + "+"

              m = re.search(r"Tracking\s+([\d,]+)\+\s+projects\s+across\s+(\d+)\s+scenarios", text, re.I)
              if m:
                  projects_count = m.group(1) + "+"
                  scenarios_count = m.group(2)

              m = re.search(r"auto-updated every\s+(\d+)\s+hours", text, re.I)
              if m:
                  refresh_hours = m.group(1)

              return {
                  "tools_count": tools_count,
                  "projects_count": projects_count,
                  "scenarios_count": scenarios_count,
                  "refresh_hours": refresh_hours,
              }

          def parse_best_scenarios():
              soup = soup_of(BASE + "/best/")
              items = []
              seen = set()

              for a in soup.select("a[href]"):
                  href = a.get("href", "").strip()
                  if not href:
                      continue

                  full = urljoin(BASE, href)
                  path = urlparse(full).path.rstrip("/")

                  if not path.startswith("/best/"):
                      continue
                  if path in ("/best", ""):
                      continue

                  slug = safe_slug(path.split("/")[-1])
                  if not slug or slug in seen:
                      continue

                  seen.add(slug)
                  items.append({
                      "slug": slug,
                      "source_url": full,
                      "local_url": f"/agent-skills/scenario/{slug}/"
                  })

              return items[:MAX_SCENARIOS]

          def parse_quick_pick(text: str):
              m = re.search(
                  r"Quick Pick\s*[—-]\s*If you only pick one,\s*go with\s+(.+?)\s+★\s*([0-9.]+k?|[0-9]+)\s*[—-]\s*(.*?)(?=\s+The Complete Guide\b|\s+Top\s+10\s+.+?\s+Tools\b)",
                  text,
                  re.I | re.S,
              )
              if not m:
                  return {}

              return {
                  "name": " ".join(m.group(1).split()),
                  "stars": m.group(2).strip(),
                  "tagline": " ".join(m.group(3).split()),
              }

          def split_meta_desc(rest: str):
              rest = " ".join(rest.split())
              for label in META_LABELS:
                  idx = rest.find(label)
                  if idx != -1:
                      end = idx + len(label)
                      meta = rest[:end].strip()
                      desc = rest[end:].strip()
                      return meta, desc
              parts = rest.split(" ", 3)
              if len(parts) >= 4:
                  return " ".join(parts[:3]), parts[3]
              return rest, ""

          def parse_tools(text: str):
              section = re.search(
                  r"Top\s+10\s+.+?\s+Tools\s+(.*?)(?=\s+Comparison Tool Stars Language License Score\b|\s+Related Categories\b|\s+Frequently Asked Questions\b|$)",
                  text,
                  re.I | re.S,
              )
              if not section:
                  return []

              body = " ".join(section.group(1).split())

              pattern = re.compile(
                  r"(\d+)\s+(.+?)\s+by\s+(.+?)\s+★\s*([0-9.]+k?|[0-9]+)\s+(.*?)\s+View Details\s*→\s*GitHub\s*→",
                  re.I | re.S,
              )

              tools = []
              for m in pattern.finditer(body):
                  rank = int(m.group(1))
                  name = " ".join(m.group(2).split())
                  author = " ".join(m.group(3).split())
                  stars = m.group(4).strip()
                  rest = m.group(5).strip()
                  meta, description = split_meta_desc(rest)

                  tools.append({
                      "rank": rank,
                      "name": name,
                      "author": author,
                      "stars": stars,
                      "meta": meta,
                      "description": description,
                  })

              return tools[:10]

          def extract_tool_github_links(soup: BeautifulSoup):
              links = []
              seen = set()
              for a in soup.select('a[href]'):
                  href = (a.get('href') or '').strip()
                  text = ' '.join(a.get_text(' ', strip=True).split())
                  if not href or 'github.com' not in href:
                      continue
                  if 'ZhuYansen/agent-skills-hub' in href:
                      continue
                  if not text.startswith('GitHub'):
                      continue
                  if href in seen:
                      continue
                  seen.add(href)
                  links.append(href)
              return links

          def parse_scenario_page(source_url: str):
              soup = soup_of(source_url)
              text = full_text(soup)

              slug = safe_slug(urlparse(source_url).path.rstrip('/').split('/')[-1])

              title = None
              h1 = soup.find('h1')
              if h1:
                  title = h1.get_text(' ', strip=True)
              if not title:
                  title_tag = soup.find('title')
                  if title_tag:
                      title = title_tag.get_text(' ', strip=True)
              if not title:
                  title = slug.replace('-', ' ').title()

              quick_pick = parse_quick_pick(text)
              tools = parse_tools(text)
              github_links = extract_tool_github_links(soup)

              for i, tool in enumerate(tools):
                  if i < len(github_links):
                      tool['github_url'] = github_links[i]

              if quick_pick and tools:
                  quick_pick['github_url'] = tools[0].get('github_url', '')

              return {
                  'title': title,
                  'source_url': source_url,
                  'slug': slug,
                  'local_url': f'/agent-skills/scenario/{slug}/',
                  'quick_pick': quick_pick,
                  'tools': tools,
              }

          def write_json(path: str, data):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)

          def write_local_scenario_page(block):
              slug = block.get('slug')
              if not slug:
                  return

              title = block.get('title', slug.replace('-', ' ').title())
              quick_pick = block.get('quick_pick', {})
              tools = block.get('tools', [])

              lines = []
              lines.append('---')
              lines.append('layout: page')
              lines.append(f'title: "{escape_yaml(title)}"')
              lines.append(f'permalink: /agent-skills/scenario/{slug}/')
              lines.append('---')
              lines.append('')
              lines.append(f'# {title}')
              lines.append('')

              if quick_pick and quick_pick.get('name'):
                  lines.append('## Quick Pick')
                  if quick_pick.get('github_url'):
                      qp = f"[**{quick_pick.get('name', '')}**]({quick_pick.get('github_url')})"
                  else:
                      qp = f"**{quick_pick.get('name', '')}**"
                  if quick_pick.get('stars'):
                      qp += f" · ★ {quick_pick.get('stars')}"
                  if quick_pick.get('tagline'):
                      qp += f" · {quick_pick.get('tagline')}"
                  lines.append(qp)
                  lines.append('')

              if tools:
                  lines.append('## 工具列表')
                  lines.append('')
                  for tool in tools:
                      if tool.get('github_url'):
                          line = f"- [**{tool.get('name', '')}**]({tool.get('github_url')})"
                      else:
                          line = f"- **{tool.get('name', '')}**"
                      if tool.get('author'):
                          line += f" by {tool.get('author')}"
                      if tool.get('stars'):
                          line += f" · ★ {tool.get('stars')}"
                      if tool.get('meta'):
                          line += f" · {tool.get('meta')}"
                      lines.append(line)
                      if tool.get('description'):
                          lines.append(f"  - {tool.get('description')}")
                  lines.append('')
              else:
                  lines.append('暂无工具数据。')
                  lines.append('')

              out_path = os.path.join('agent-skills', 'scenario', f'{slug}.md')
              with open(out_path, 'w', encoding='utf-8') as f:
                  f.write('\n'.join(lines))

          def cleanup_old_generated_pages(valid_slugs):
              out_dir = os.path.join('agent-skills', 'scenario')
              os.makedirs(out_dir, exist_ok=True)
              for filename in os.listdir(out_dir):
                  if not filename.endswith('.md'):
                      continue
                  slug = filename[:-3]
                  if slug not in valid_slugs:
                      os.remove(os.path.join(out_dir, filename))

          summary = parse_home_summary()
          scenario_refs = parse_best_scenarios()

          curated = []
          valid_slugs = set()

          for item in scenario_refs:
              try:
                  block = parse_scenario_page(item['source_url'])
                  curated.append(block)
                  valid_slugs.add(block['slug'])
              except Exception as e:
                  curated.append({
                      'title': item['slug'].replace('-', ' ').title(),
                      'source_url': item['source_url'],
                      'slug': item['slug'],
                      'local_url': item['local_url'],
                      'quick_pick': {},
                      'tools': [],
                      'error': str(e),
                  })
                  valid_slugs.add(item['slug'])

          meta = {
              'updated_at_utc': datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC'),
          }

          write_json('_data/agentskills/meta.json', meta)
          write_json('_data/agentskills/summary.json', summary)
          write_json('_data/agentskills/scenarios.json', scenario_refs)
          write_json('_data/agentskills/curated.json', curated)

          cleanup_old_generated_pages(valid_slugs)

          for block in curated:
              write_local_scenario_page(block)

          print('Done. JSON and local pages generated.')
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/agentskills agent-skills/scenario
          git diff --cached --quiet || git commit -m "chore: sync AgentSkillsHub content"

      - name: Push changes
        run: git push
