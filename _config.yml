# ---------------- #
#   Main Configs   #
# ---------------- #
baseurl: ""
url: "https://ybot.top"
date_format: "ordinal"
title: YBot Archive
subtitle: "技术文章、工具笔记与内容留存"
description: "关于技术、折腾、阅读与长期留存的一份持续记录。"
keywords: ybot, ybot.top, 技术博客, 开发笔记, 技术文章, 工具教程, 运维记录, 内容留存, 网页归档, 知识整理
timezone: Asia/Shanghai
encoding: "utf-8"

# 页面左下角显示的年份
since: 2024

# 源码仓库
repository: mauphilos/mauphilos.github.io

# 对 css 和 js 资源的 cdn 加速配置
cdn:
    jsdelivr:
        enabled: false

# 可选组件配置
components:
    # 分享
    # weibo,qq,wechat,douban,qzone,linkedin,facebook,twitter
    share:
        enabled: false
        hide-platforms: qq,facebook

    # 不蒜子访问统计
    busuanzi:
        enabled: true
        start_date: 2024-03-03

    # My Popular Repositories
    side_bar_repo:
        enabled: true
        limit: 5

    # 文章字数统计
    word_count:
        enabled: true

    # 页面右上角，以及「关于」页面的二维码
    # 修改图片请替换 assets/images/qrcode.jpg
    qrcode:
        enabled: false
        image_alt: YBot

    # 维基索引页使用哪种视图，支持 列表（list）/分类（cate）
    wiki:
        view: cate

    # 图片灯箱效果功能
    fancybox:
        enabled: false

# 压缩页面内容
compress_html:
  clippings: all
  comments: ["<!--", "-->"]

# 代码高亮风格
highlight_theme: github

# ---------------- #
#      Author      #
# ---------------- #
author: YBot
organization:
organization_url:
github_username: Maurilos
location: China
email: your-email@example.com

# ---------------- #
#    Navigation    #
# ---------------- #
navs:
  -
    href: /
    label: 首页

  -
    href: /categories/
    label: 分享

  -
    href: /archives/
    label: 归档
    mobile-hidden: true

  -
    href: /fragments/
    label: 碎片

  -
    href: /daily/
    label: 英语

  -
    href: /wiki/
    label: 维基

  -
    href: /agent-skills/
    label: 技能
    

  -
    href: /links/
    label: 链接
    mobile-hidden: true

  -
    href: /about/
    label: 关于

# ---------------- #
#       RSS        #
# ---------------- #
subscribe_rss: /feed.xml

# ---------------- #
#      Jekyll      #
# ---------------- #
markdown: kramdown
kramdown:
    input: GFM
highlighter: rouge
paginate: 10
lsi: false
quiet: false
excerpt_separator: "\n\n"
permalink: /:year/:month/:day/:title/
plugins:
    - jekyll-github-metadata
    - rouge
    - jekyll-paginate
    - jekyll-sitemap
    - jekyll-feed
    - jemoji

collections:
    wiki:
        output: true
        permalink: /wiki/:path/
    fragments:
        output: true
        permalink: /fragment/:path/
    daily:
        output: true
        permalink: /:collection/:year/:month/:title/

# ---------------- #
#      Comments    #
# ---------------- #
# support provider: disqus, gitment, gitalk, utterances, beaudar, giscus
comments_provider: giscus

disqus:
    username:

gitment:
    owner: mauphilos
    repo: mauphilos.github.io-comments
    oauth:
        client_id:
        client_secret:

gitalk:
    owner: mauphilos
    repo: mauphilos.github.io-comments
    clientID:
    clientSecret:

utterances:
    repo: mauphilos/mauphilos.github.io

beaudar:
    repo: mauphilos/mauphilos.github.io

giscus:
    repo: mauphilos/mauphilos.github.io
    repo-id:
    category: Announcements
    category-id:

# 在使用其它评论组件时可点击显示 Disqus
lazy_load_disqus: false

# ---------------- #
#      Search      #
# ---------------- #
simple_jekyll_search:
    fulltext: false
    limit: 10

# ---------------- #
#      Google      #
# ---------------- #
google:
    analytics_id:
    adsense:
        enabled: false
        footer: false
        sidebar: false
        sidebar-detail: false
        content_header: false
        content_footer: false
